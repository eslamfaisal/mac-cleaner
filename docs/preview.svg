    <text x="96" y="31" class="t big" font-size="15">🧹 Mac Cleaner</text>
    <text x="232" y="31" class="m" font-size="12">v1.1.0</text>
    <!-- disk gauge -->
    <rect x="330" y="20" width="330" height="8" rx="4" fill="url(#disk)"/>
