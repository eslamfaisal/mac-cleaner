<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="disk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a887f"/><stop offset="0.58" stop-color="#8a887f"/>
      <stop offset="0.58" stop-color="#3987e5"/><stop offset="0.86" stop-color="#3987e5"/>
      <stop offset="0.86" stop-color="#2c2c2a"/><stop offset="1" stop-color="#2c2c2a"/>
    </linearGradient>
    <style>
      .t  { fill:#ffffff; } .m { fill:#898781; } .m2 { fill:#c3c2b7; }
      .big{ font-weight:700; } .lbl{ font-size:12px; } .val{ font-size:21px; font-weight:700; }
    </style>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="1000" height="620" rx="16" fill="#0d0d0d"/>
  <rect x="0.5" y="0.5" width="999" height="619" rx="16" fill="none" stroke="rgba(255,255,255,0.10)"/>

  <!-- title bar -->
  <g>
